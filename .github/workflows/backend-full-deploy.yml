name: Backend Full Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - cfdemo
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""
      run_tests:
        description: "Run Maven tests during the full deploy build"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  deploy:
    name: Create Or Update Full Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ENV="${{ github.event.inputs.environment }}"
          MANUAL_TAG="${{ github.event.inputs.image_tag }}"

          if [[ -n "$MANUAL_TAG" ]]; then
            IMAGE_TAG="$MANUAL_TAG"
          else
            IMAGE_TAG="$DEPLOY_ENV"
          fi

          echo "deploy_environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "Deploy environment: $DEPLOY_ENV"
          echo "Image tag: $IMAGE_TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: careconnect-backend-full-deploy

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make deploy script executable
        run: chmod +x cloudformation-fargate/cdeploy_cloudformation.sh

      - name: Load environment secrets
        shell: bash
        env:
          DEV_DATABASE_MASTER_PASSWORD: ${{ secrets.DEV_DATABASE_MASTER_PASSWORD }}
          DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
          CFDEMO_DATABASE_MASTER_PASSWORD: ${{ secrets.CFDEMO_DATABASE_MASTER_PASSWORD }}
          CFDEMO_JWT_SECRET: ${{ secrets.CFDEMO_JWT_SECRET }}
        run: |
          set -euo pipefail

          case "${{ steps.settings.outputs.deploy_environment }}" in
            dev)
              DB_PASSWORD="$DEV_DATABASE_MASTER_PASSWORD"
              JWT_SECRET="$DEV_JWT_SECRET"
              ;;
            cfdemo)
              DB_PASSWORD="$CFDEMO_DATABASE_MASTER_PASSWORD"
              JWT_SECRET="$CFDEMO_JWT_SECRET"
              ;;
            *)
              echo "No GitHub secret mapping is configured for environment '${{ steps.settings.outputs.deploy_environment }}'." >&2
              exit 1
              ;;
          esac

          if [[ -z "$DB_PASSWORD" || -z "$JWT_SECRET" ]]; then
            echo "Required GitHub secrets are missing for environment '${{ steps.settings.outputs.deploy_environment }}'." >&2
            exit 1
          fi

          {
            echo "CARECONNECT_DATABASE_MASTER_PASSWORD=$DB_PASSWORD"
            echo "CARECONNECT_JWT_SECRET=$JWT_SECRET"
          } >> "$GITHUB_ENV"

      - name: Deploy full CloudFormation environment
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ARGS=(
            --environment "${{ steps.settings.outputs.deploy_environment }}"
            --region "${{ env.AWS_REGION }}"
            --image-tag "${{ steps.settings.outputs.image_tag }}"
          )

          if [[ "${{ github.event.inputs.run_tests }}" == "true" ]]; then
            DEPLOY_ARGS+=(--run-tests)
          fi

          ./cloudformation-fargate/cdeploy_cloudformation.sh "${DEPLOY_ARGS[@]}"
