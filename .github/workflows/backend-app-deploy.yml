name: Backend App Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "cloudformation-fargate/templates/04-service.yaml"
      - "cloudformation-fargate/parameters/*-service.json"
      - "cloudformation-fargate/cdeploy_app_only.sh"
      - ".github/workflows/backend-app-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - cfdemo
          - staging
          - prod
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-app-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  deploy:
    name: Build Push and Update ECS Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail

          DEFAULT_ENV="${{ vars.CF_ENVIRONMENT || 'dev' }}"
          MANUAL_ENV="${{ github.event.inputs.environment || '' }}"
          MANUAL_TAG="${{ github.event.inputs.image_tag || '' }}"

          if [[ -n "$MANUAL_ENV" ]]; then
            DEPLOY_ENV="$MANUAL_ENV"
          else
            DEPLOY_ENV="$DEFAULT_ENV"
          fi

          if [[ -n "$MANUAL_TAG" ]]; then
            IMAGE_TAG="$MANUAL_TAG"
          else
            IMAGE_TAG="${DEPLOY_ENV}-${GITHUB_SHA::7}"
          fi

          echo "deploy_environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "Deploy environment: $DEPLOY_ENV"
          echo "Image tag: $IMAGE_TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: careconnect-backend-app-deploy

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make deploy script executable
        run: chmod +x cloudformation-fargate/cdeploy_app_only.sh

      - name: Build backend image and update ECS service
        shell: bash
        run: |
          set -euo pipefail
          ./cloudformation-fargate/cdeploy_app_only.sh \
            --environment "${{ steps.settings.outputs.deploy_environment }}" \
            --region "${{ env.AWS_REGION }}" \
            --image-tag "${{ steps.settings.outputs.image_tag }}"
