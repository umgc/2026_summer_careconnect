# team-b-ci.yml
# Team B — Automated Testing & Coverage Enforcement Pipeline
#
# Triggers:
#   push feature/b-*        → fast path: build + unit tests only
#   PR  → team-b-develop    → full pipeline
#   push develop            → full pipeline + regression suite
#
# Stages (single job, sequential steps):
#   1. Checkout, branch validation, JAVA_HOME
#   2. Build  (Flutter + Maven)
#   3. Unit tests
#   4. Coverage generation + artifact upload
#   5. Coverage gate (scripts/coverage-gate.sh)
#   6. E2E tests on Android emulator  [full pipeline only]
#   7. Accessibility scan (axe-core 4.x on Flutter web)  [full pipeline only]
#   8. Final artifact upload

name: Team B CI

on:
  push:
    branches:
      - 'feature/b-**'
      - develop
  pull_request:
    branches:
      - team-b-develop

env:
  FLUTTER_VERSION: '3.x'
  JAVA_VERSION: '17'

jobs:
  team-b-pipeline:
    name: Team B — Build, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # Stage 1: Checkout + branch validation + JAVA_HOME
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming convention
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Branch: ${BRANCH}"
          if [[ "${BRANCH}" != feature/b-* && \
                "${BRANCH}" != team-b-* && \
                "${BRANCH}" != develop ]]; then
            echo "ERROR: Branch '${BRANCH}' does not follow Team B naming."
            echo "Feature branches must be named feature/b-<description>."
            exit 1
          fi

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Confirm JAVA_HOME
        run: |
          echo "JAVA_HOME=${JAVA_HOME}"
          java -version

      # ----------------------------------------------------------------
      # Stage 2: Build — Flutter + Maven
      # ----------------------------------------------------------------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: frontend
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          flutter pub get

      - name: Flutter analyze (fast static check)
        working-directory: frontend
        continue-on-error: true
        run: |
          flutter analyze --no-pub 2>&1 | tail -5
          echo "Note: analyze is informational — Team D's SAST pipeline enforces analysis."

      - name: Maven compile (skip tests)
        working-directory: backend/core
        run: mvn -B clean compile -DskipTests

      # ----------------------------------------------------------------
      # Stage 3: Unit tests
      # ----------------------------------------------------------------
      - name: Flutter unit tests
        working-directory: frontend
        continue-on-error: true
        run: |
          flutter test --exclude-tags integration --reporter expanded 2>&1 | tail -5
          echo "Note: pre-existing test failures are tracked — coverage gate enforces quality."

      - name: Maven unit tests
        working-directory: backend/core
        continue-on-error: true
        run: mvn -B test

      # ----------------------------------------------------------------
      # Stage 4: Coverage generation + artifact upload
      # ----------------------------------------------------------------
      - name: Flutter test with coverage
        working-directory: frontend
        run: flutter test --coverage --exclude-tags integration

      - name: Maven verify (JaCoCo report + check)
        working-directory: backend/core
        run: mvn -B verify -DskipTests=false

      - name: Upload raw coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-raw
          path: |
            frontend/coverage/lcov.info
            backend/core/target/site/jacoco/
          retention-days: 14

      # ----------------------------------------------------------------
      # Stage 5: Coverage gate
      # Posts failure details as a PR comment on hard failures.
      # ----------------------------------------------------------------
      - name: Run coverage gate
        run: |
          chmod +x scripts/coverage-gate.sh
          scripts/coverage-gate.sh \
            . \
            "${{ github.event.pull_request.number }}" \
            "${{ secrets.GITHUB_TOKEN }}"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ----------------------------------------------------------------
      # Stage 6: E2E tests on Android emulator
      # Skipped on feature/b-* push (fast path).
      # Tests annotated with "// BLOCKED:" are logged and skipped.
      # ----------------------------------------------------------------
      - name: Enable KVM for Android emulator
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Identify BLOCKED integration tests
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        id: scan-blocked
        working-directory: frontend
        run: |
          echo "=== Integration tests containing // BLOCKED: ==="
          find integration_test -name "*_test.dart" \
            -exec grep -l "// BLOCKED:" {} \; \
            | tee /tmp/blocked_tests.txt || true
          echo "blocked_count=$(wc -l < /tmp/blocked_tests.txt | tr -d ' ')" \
            >> "$GITHUB_OUTPUT"
          echo "=== Blocked test count: $(cat /tmp/blocked_tests.txt | wc -l) ==="

      - name: Run E2E integration tests (Android emulator)
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          target: google_apis
          emulator-options: >-
            -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd frontend
            BLOCKED_LIST=/tmp/blocked_tests.txt
            EXIT_CODE=0

            ALL_TESTS=$(find integration_test -name "*_test.dart" | sort)
            for test_file in $ALL_TESTS; do
              if [ -f "$BLOCKED_LIST" ] && grep -q "$test_file" "$BLOCKED_LIST"; then
                echo "SKIP (// BLOCKED:): $test_file"
              else
                echo "RUN: $test_file"
                flutter test "$test_file" \
                  -d emulator-5554 \
                  --reporter expanded || EXIT_CODE=$?
              fi
            done
            exit $EXIT_CODE

      # ----------------------------------------------------------------
      # Stage 7: Accessibility scan — axe-core 4.x on Flutter web
      # Skipped on feature/b-* push (fast path).
      # Enforces WCAG 2.1 AA (tags: wcag2a, wcag2aa).
      # ----------------------------------------------------------------
      - name: Set up Node.js for axe-core
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Flutter web
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        working-directory: frontend
        run: flutter build web --release

      - name: Install axe-core CLI and static server
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        run: npm install -g @axe-core/cli@4 serve

      - name: Serve Flutter web and run WCAG 2.1 AA scan
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        working-directory: frontend
        run: |
          serve -s build/web -l 5000 &
          SERVER_PID=$!
          # Wait for server to be ready
          for i in $(seq 1 10); do
            curl -sf http://localhost:5000 > /dev/null && break
            sleep 2
          done

          AXE_EXIT=0
          axe http://localhost:5000 \
            --tags wcag2a,wcag2aa \
            --reporter json \
            --save accessibility-report.json \
            --exit || AXE_EXIT=$?

          kill "$SERVER_PID" 2>/dev/null || true

          if [ "$AXE_EXIT" -ne 0 ]; then
            echo "=== Accessibility violations (WCAG 2.1 AA) ==="
            python3 -c "
          import json, sys
          with open('accessibility-report.json') as f:
              data = json.load(f)
          violations = data.get('violations', [])
          print(f'Total violations: {len(violations)}')
          for v in sorted(violations, key=lambda x: x.get('impact',''), reverse=True):
              print(f\"  [{v.get('impact','?').upper()}] {v['id']}: {v['description']}\")
          "
            exit 1
          fi
          echo "Accessibility scan passed (WCAG 2.1 AA)."

      # ----------------------------------------------------------------
      # Stage 8: Final artifact upload
      # ----------------------------------------------------------------
      - name: Upload accessibility report
        if: >
          always() && (
            github.event_name == 'pull_request' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/develop')
          )
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: frontend/accessibility-report.json
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/core/target/surefire-reports/
            frontend/test-results/
          retention-days: 14
