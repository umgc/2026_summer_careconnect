aws.s3.base-url=${AWS_S3_BASE_URL:}

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket Configuration (defaults to disabled, enable per profile)
careconnect.websocket.enabled=${WEBSOCKET_ENABLED:false}
careconnect.websocket.mode=${WEBSOCKET_MODE:aws}

# Chime live transcription (required for realtime transcript sentiment events)
careconnect.chime.transcription.enabled=${CARECONNECT_CHIME_TRANSCRIPTION_ENABLED:true}
careconnect.chime.transcription.language-code=${CARECONNECT_CHIME_TRANSCRIPTION_LANGUAGE:en-US}
careconnect.chime.transcription.region=${CARECONNECT_CHIME_TRANSCRIPTION_REGION:us-east-1}

# ── Call Recording (AWS Chime Media Capture Pipelines → S3) ──────────────────
#
# Enable:  set CARECONNECT_RECORDING_ENABLED=true  (local dev or Fargate task env)
#
# The following are provisioned AUTOMATICALLY at startup — no manual config needed:
#   • S3 bucket:  careconnect-recordings-{accountId}-{region}  (created if absent)
#   • Bucket policy granting chime.amazonaws.com write access  (applied on every start)
#   • IAM service-linked role: AWSServiceRoleForAmazonChimeSDKMediaPipelines
#
# REQUIRED IAM permissions on the AWS user / Fargate task role:
#   iam:CreateServiceLinkedRole   — Resource: arn:aws:iam::*:role/aws-service-role/mediapipelines.chime.amazonaws.com/*
#   s3:CreateBucket               — Resource: arn:aws:s3:::careconnect-recordings-*
#   s3:PutBucketPolicy            — Resource: arn:aws:s3:::careconnect-recordings-*
#   s3:PutObject                  — Resource: arn:aws:s3:::careconnect-recordings-*/*
#   s3:GetObject                  — Resource: arn:aws:s3:::careconnect-recordings-*/*
#   s3:ListBucket                 — Resource: arn:aws:s3:::careconnect-recordings-*
#   s3:DeleteObject               — Resource: arn:aws:s3:::careconnect-recordings-*/*  (for dev purge)
#   chime:CreateMediaCapturePipeline
#   chime:CreateMediaConcatenationPipeline
#   chime:DeleteMediaCapturePipeline
#   chime:GetMediaPipeline
#   chime:GetMediaCapturePipeline
#
# IF iam:CreateServiceLinkedRole is missing, run ONCE manually (any team member, any machine):
#   aws iam create-service-linked-role --aws-service-name mediapipelines.chime.amazonaws.com
# This is a one-time per-AWS-account operation — it does not need to be repeated.
#
# ── Speaker ID / KVS (ingest + polling discovery) ───────────────────
# Local dev uses the IAM user in .env (NOT EcsTaskRole). Required when CARECONNECT_KVS_ENABLED=true:
#   chime:CreateMediaStreamPipeline, chime:DeleteMediaPipeline, chime:GetMediaPipeline
#   chime:CreateMediaInsightsPipeline, chime:DeleteMediaInsightsPipeline, chime:GetMediaInsightsPipeline
#   kinesisvideo:ListStreams, kinesisvideo:ListFragments, kinesisvideo:GetDataEndpoint,
#   kinesisvideo:GetMedia, kinesisvideo:DescribeStream
#   Resource: arn:aws:kinesisvideo:us-east-1:{accountId}:stream/*
# (Same as cloudformation-fargate/templates/03-platform.yaml EcsTaskRole KinesisVideoStreams sid.)
careconnect.kvs.enabled=${CARECONNECT_KVS_ENABLED:false}
careconnect.kvs.stream-pool-arn=${CARECONNECT_KVS_STREAM_POOL_ARN:}
careconnect.kvs.stream-arns=${CARECONNECT_KVS_STREAM_ARNS:}
careconnect.kvs.stream-discovery-timeout-ms=${CARECONNECT_KVS_STREAM_DISCOVERY_TIMEOUT_MS:60000}
careconnect.kvs.stream-discovery-poll-interval-ms=${CARECONNECT_KVS_STREAM_DISCOVERY_POLL_INTERVAL_MS:3000}
careconnect.kvs.event-webhook.enabled=${CARECONNECT_KVS_EVENT_WEBHOOK_ENABLED:false}
# Optional EventBridge fast-path only; KVS polling is the primary attendee→stream discovery path.
careconnect.chime.media-insights-config-arn=${CARECONNECT_CHIME_MEDIA_INSIGHTS_CONFIG_ARN:}

careconnect.recording.enabled=${CARECONNECT_RECORDING_ENABLED:false}
careconnect.recording.presigned-url-ttl-minutes=${CARECONNECT_RECORDING_PRESIGNED_TTL_MINUTES:15}
careconnect.recording.raw-cleanup.enabled=${CARECONNECT_RECORDING_RAW_CLEANUP_ENABLED:true}
careconnect.recording.raw-cleanup.interval-ms=${CARECONNECT_RECORDING_RAW_CLEANUP_INTERVAL_MS:60000}

# Transcript archival for long calls (PHI stays private in encrypted S3; DB keeps only metadata pointer)
app.call.transcript.archive.enabled=${CARECONNECT_CALL_TRANSCRIPT_ARCHIVE_ENABLED:true}
app.call.transcript.archive.min-segments=${CARECONNECT_CALL_TRANSCRIPT_ARCHIVE_MIN_SEGMENTS:600}
app.call.transcript.archive.min-chars=${CARECONNECT_CALL_TRANSCRIPT_ARCHIVE_MIN_CHARS:120000}
app.call.transcript.archive.delete-db-after-archive=${CARECONNECT_CALL_TRANSCRIPT_ARCHIVE_DELETE_DB_AFTER:true}

careconnect.websocket.endpoint=/ws/careconnect
careconnect.websocket.connection-ttl-minutes=120

#ALEXA OAUTH Configuration
# NOTE: Alexa OAuth credentials must be set via environment variables in production.
# Google Places API key must be set via GOOGLE_PLACES_API_KEY environment variable.
# See deployment guide for required environment variable configuration.
alexa.oauth.client-id=${ALEXA_CLIENT_ID:alexa-careconnect-client}
alexa.oauth.client-secret=${ALEXA_CLIENT_SECRET:}
google.places.api-key=${GOOGLE_PLACES_API_KEY:}

# Serialize LocalDateTime/LocalDate as ISO-8601 strings (not arrays)
spring.jackson.serialization.write-dates-as-timestamps=false

#Bedrock Integration
careconnect.llm.enabled=${CARECONNECT_LLM_ENABLED:false}

# ACTUATOR CONFIGURATION (HEALTH CHECKS)
# Expose only the health endpoint over HTTP
# (keeps surface area minimal for security)
management.endpoints.web.exposure.include=health

# Always show health details (useful for CI/CD + debugging)
management.endpoint.health.show-details=always

# DISABLE MAIL HEALTH CHECK (DEV)
management.health.mail.enabled=false