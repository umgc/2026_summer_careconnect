AWSTemplateFormatVersion: '2010-09-09'
Description: CareConnect platform stack for ECR, ECS cluster, roles, and logs.

Parameters:
  # Environment name drives resource naming and exports.
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - cfdemo
      - staging
      - prod

  # Repo name can be made unique per environment when running parallel stacks.
  RepositoryName:
    Type: String
    Default: careconnect-backend

  # Log retention for the backend container log group.
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365

  # One-time Chime Media Insights configuration ARN (empty until ops creates the config).
  MediaInsightsConfigArn:
    Type: String
    Default: ''
    Description: >
      ARN of the Chime Media Insights pipeline configuration for per-attendee speaker capture.
      Create the configuration in AWS once, then pass the ARN on stack create/update.

Resources:
  # Backend image repository.
  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false

  # Log group used by the ECS task definition.
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/careconnect-backend-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  # ECS cluster that will host the Fargate service.
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub careconnect-${Environment}-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # Execution role: image pull, logs, secrets read.
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub careconnect-${Environment}-ecsTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub careconnect-${Environment}-ecs-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/careconnect/${Environment}/*

  # Task role: application IAM surface (KVS speaker capture, Media Insights, recording).
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub careconnect-${Environment}-ecsTaskRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub careconnect-${Environment}-kvs-media-insights
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: KinesisVideoStreams
                Effect: Allow
                Action:
                  - kinesisvideo:CreateStream
                  - kinesisvideo:DescribeStream
                  - kinesisvideo:GetDataEndpoint
                  - kinesisvideo:GetMedia
                  - kinesisvideo:PutMedia
                  - kinesisvideo:TagStream
                  - kinesisvideo:ListStreams
                  - kinesisvideo:ListFragments
                Resource: !Sub arn:aws:kinesisvideo:${AWS::Region}:${AWS::AccountId}:stream/*
              - Sid: ChimeMediaStreamPipelines
                Effect: Allow
                Action:
                  - chime:CreateMediaStreamPipeline
                  - chime:DeleteMediaPipeline
                  - chime:GetMediaPipeline
                Resource: '*'
              - Sid: ChimeMediaInsights
                Effect: Allow
                Action:
                  - chime:CreateMediaInsightsPipeline
                  - chime:DeleteMediaInsightsPipeline
                  - chime:GetMediaInsightsPipeline
                  - chime:CreateMediaInsightsPipelineConfiguration
                  - chime:GetMediaInsightsPipelineConfiguration
                  - chime:ListMediaInsightsPipelineConfigurations
                Resource: '*'
              - Sid: SpeakerCaptureSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/careconnect/${Environment}/kvs-stream-arns
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/careconnect/${Environment}/kvs-stream-pool-arn
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/careconnect/${Environment}/chime-media-insights-config-arn

  # Pre-provisioned KVS streams for per-attendee speaker capture (pool checkout in app).
  KvsSpeakerStream01:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-01
      DataRetentionInHours: 24
  KvsSpeakerStream02:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-02
      DataRetentionInHours: 24
  KvsSpeakerStream03:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-03
      DataRetentionInHours: 24
  KvsSpeakerStream04:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-04
      DataRetentionInHours: 24
  KvsSpeakerStream05:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-05
      DataRetentionInHours: 24
  KvsSpeakerStream06:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-06
      DataRetentionInHours: 24
  KvsSpeakerStream07:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-07
      DataRetentionInHours: 24
  KvsSpeakerStream08:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-08
      DataRetentionInHours: 24
  KvsSpeakerStream09:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-09
      DataRetentionInHours: 24
  KvsSpeakerStream10:
    Type: AWS::KinesisVideo::Stream
    Properties:
      Name: !Sub careconnect-${Environment}-kvs-10
      DataRetentionInHours: 24

  KvsStreamArnsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /careconnect/${Environment}/kvs-stream-arns
      Type: String
      Description: Comma-separated KVS stream ARNs for speaker-ID pool checkout
      Value: !Join
        - ','
        - - !GetAtt KvsSpeakerStream01.Arn
          - !GetAtt KvsSpeakerStream02.Arn
          - !GetAtt KvsSpeakerStream03.Arn
          - !GetAtt KvsSpeakerStream04.Arn
          - !GetAtt KvsSpeakerStream05.Arn
          - !GetAtt KvsSpeakerStream06.Arn
          - !GetAtt KvsSpeakerStream07.Arn
          - !GetAtt KvsSpeakerStream08.Arn
          - !GetAtt KvsSpeakerStream09.Arn
          - !GetAtt KvsSpeakerStream10.Arn

  # Chime KVS Stream Pool for media stream pipeline ingest (create once via CLI/console).
  # aws chime-sdk-media-pipelines create-media-pipeline-kinesis-video-stream-pool ...
  KvsStreamPoolArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /careconnect/${Environment}/kvs-stream-pool-arn
      Type: String
      Description: >-
        Chime media-pipeline-kinesis-video-stream-pool ARN for CreateMediaStreamPipeline ingest.
        Set manually after creating the pool (not provisioned by this stack).
      Value: REPLACE_WITH_CHIME_KVS_STREAM_POOL_ARN

  ChimeMediaInsightsConfigArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /careconnect/${Environment}/chime-media-insights-config-arn
      Type: String
      Description: Chime Media Insights pipeline configuration ARN for speaker-ID capture
      Value: !Ref MediaInsightsConfigArn

Outputs:
  # Exported outputs are consumed by the service stack.
  EcrRepositoryUri:
    Value: !GetAtt BackendRepository.RepositoryUri
    Export:
      Name: !Sub careconnect-${Environment}-EcrRepositoryUri

  EcrRepositoryName:
    Value: !Ref BackendRepository
    Export:
      Name: !Sub careconnect-${Environment}-EcrRepositoryName

  EcsClusterName:
    Value: !Ref EcsCluster
    Export:
      Name: !Sub careconnect-${Environment}-EcsClusterName

  EcsClusterArn:
    Value: !GetAtt EcsCluster.Arn
    Export:
      Name: !Sub careconnect-${Environment}-EcsClusterArn

  EcsTaskExecutionRoleArn:
    Value: !GetAtt EcsTaskExecutionRole.Arn
    Export:
      Name: !Sub careconnect-${Environment}-EcsTaskExecutionRoleArn

  EcsTaskRoleArn:
    Value: !GetAtt EcsTaskRole.Arn
    Export:
      Name: !Sub careconnect-${Environment}-EcsTaskRoleArn

  BackendLogGroupName:
    Value: !Ref BackendLogGroup
    Export:
      Name: !Sub careconnect-${Environment}-BackendLogGroupName

  KvsStreamArnsParameterName:
    Value: !Ref KvsStreamArnsParameter
    Export:
      Name: !Sub careconnect-${Environment}-KvsStreamArnsParameterName

  KvsStreamPoolSize:
    Value: '10'
    Export:
      Name: !Sub careconnect-${Environment}-KvsStreamPoolSize

  ChimeMediaInsightsConfigArnParameterName:
    Value: !Ref ChimeMediaInsightsConfigArnParameter
    Export:
      Name: !Sub careconnect-${Environment}-ChimeMediaInsightsConfigArnParameterName
