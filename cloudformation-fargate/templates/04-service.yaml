AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CareConnect ECS Fargate service with API Gateway HTTP API, VPC Link,
  Cloud Map service discovery, ACM certificate, and Route 53 custom domain.

Parameters:
  # Environment name must match the networking, data, and platform stacks.
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - cfdemo
      - staging
      - prod

  # Full repository URI with tag, for example:
  # 123456789012.dkr.ecr.us-east-1.amazonaws.com/careconnect-backend-cfdemo:cfdemo
  BackendImageUri:
    Type: String
    Description: Full ECR image URI including tag

  # Current application convention is to run the cloud deployment with the dev profile.
  SpringProfile:
    Type: String
    Default: dev

  # Used by backend auth / redirect flows and some generated links.
  FrontendBaseUrl:
    Type: String
    Default: http://localhost:3000

  # Passed through to careconnect.cors_allowed.
  CorsAllowedList:
    Type: String
    Default: http://localhost:*,http://127.0.0.1:*

  # The backend currently binds to 8081 in ECS.
  ContainerPort:
    Type: Number
    Default: 8081

  # Start small for demo. Scale later by updating the stack.
  DesiredCount:
    Type: Number
    Default: 1

  # ECS/Fargate task sizing.
  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues:
      - '256'
      - '512'
      - '1024'
      - '2048'
      - '4096'

  # Fargate memory must be valid for the chosen CPU value.
  TaskMemory:
    Type: String
    Default: '3072'

  # Public health endpoint used by Cloud Map health checks.
  HealthCheckPath:
    Type: String
    Default: /v1/api/test/health

  # Custom domain name for API Gateway (e.g., api.careconnect.example.com).
  # Leave empty to skip Route 53 and ACM resources (API Gateway will still
  # provide its default execute-api endpoint).
  DomainName:
    Type: String
    Default: ''
    Description: Custom domain name for the API (leave empty to use default API Gateway URL)

  # Route 53 hosted zone ID for the custom domain.
  # Required only when DomainName is provided.
  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 Hosted Zone ID (required if DomainName is set)

Conditions:
  # Only create custom domain resources when a domain name is provided.
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  # ---------------------------------------------------------------------------
  # Cloud Map namespace and service for ECS service discovery.
  # API Gateway VPC Link routes traffic through Cloud Map to ECS tasks.
  # ---------------------------------------------------------------------------

  # Private DNS namespace used by Cloud Map for service discovery within the VPC.
  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub careconnect-${Environment}.local
      Vpc:
        Fn::ImportValue: !Sub careconnect-${Environment}-VpcId
      Description: !Sub CareConnect ${Environment} service discovery namespace

  # Cloud Map service registered by ECS for task instance discovery.
  CloudMapService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: backend
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 15
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # API Gateway HTTP API with VPC Link integration.
  # ---------------------------------------------------------------------------

  # VPC Link allows API Gateway to reach resources in the VPC (ECS tasks).
  VpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub careconnect-${Environment}-vpc-link
      SubnetIds:
        - Fn::ImportValue: !Sub careconnect-${Environment}-PublicSubnetAId
        - Fn::ImportValue: !Sub careconnect-${Environment}-PublicSubnetBId
      SecurityGroupIds:
        - Fn::ImportValue: !Sub careconnect-${Environment}-VpcLinkSecurityGroupId

  # HTTP API (cheaper and simpler than REST API, supports JWT authorizers natively).
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub careconnect-${Environment}-api
      ProtocolType: HTTP
      Description: !Sub CareConnect ${Environment} backend API
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        MaxAge: 86400

  # Default integration pointing to the Cloud Map service via VPC Link.
  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId: !Ref VpcLink
      IntegrationUri: !GetAtt CloudMapService.Arn
      PayloadFormatVersion: '1.0'

  # Catch-all route that forwards every request to the backend.
  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub integrations/${HttpApiIntegration}

  # Auto-deploy stage so changes are live immediately.
  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  # ---------------------------------------------------------------------------
  # ACM Certificate + Custom Domain + Route 53 (conditional on DomainName).
  # ---------------------------------------------------------------------------

  # ACM certificate for HTTPS on the custom domain. DNS validation is used.
  AcmCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub careconnect-${Environment}-api-cert

  # API Gateway custom domain name bound to the ACM certificate.
  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref AcmCertificate

  # Maps the custom domain to the HTTP API default stage.
  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCustomDomain
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomainName
      Stage: !Ref HttpApiStage

  # Route 53 alias record pointing the custom domain to the API Gateway.
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

  # ---------------------------------------------------------------------------
  # ECS Task Definition and Service.
  # ---------------------------------------------------------------------------

  # ECS task definition tied to the runtime contract used by the backend code.
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub careconnect-${Environment}-backend
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub careconnect-${Environment}-EcsTaskExecutionRoleArn
      TaskRoleArn:
        Fn::ImportValue: !Sub careconnect-${Environment}-EcsTaskRoleArn
      RuntimePlatform:
        OperatingSystemFamily: LINUX
        CpuArchitecture: X86_64
      ContainerDefinitions:
        - Name: cc-backend
          Image: !Ref BackendImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              HostPort: !Ref ContainerPort
              Protocol: tcp
              AppProtocol: http
              Name: backend-port
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub careconnect-${Environment}-BackendLogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            # Non-secret runtime configuration.
            - Name: SPRING_PROFILES_ACTIVE
              Value: !Ref SpringProfile
            - Name: SERVER_PORT
              Value: !Sub '${ContainerPort}'
            - Name: JDBC_URI
              Value:
                Fn::ImportValue: !Sub careconnect-${Environment}-DatabaseJdbcUri
            - Name: DB_USER
              Value:
                Fn::ImportValue: !Sub careconnect-${Environment}-DatabaseUsername
            - Name: APP_FRONTEND_BASE_URL
              Value: !Ref FrontendBaseUrl
            # Spring Boot relaxed binding for frontend.base-url (overrides baked application-dev.properties).
            - Name: FRONTEND_BASE_URL
              Value: !Ref FrontendBaseUrl
            - Name: CORS_ALLOWED_LIST
              Value: !Ref CorsAllowedList
            # Spring Boot relaxed binding for careconnect.cors_allowed (overrides baked application-dev.properties).
            - Name: CARECONNECT_CORS_ALLOWED
              Value: !Ref CorsAllowedList
            - Name: SPRING_FLYWAY_ENABLED
              Value: 'false'
            - Name: SPRING_JPA_HIBERNATE_DDL_AUTO
              Value: update
          Secrets:
            # Secret injection from the data stack.
            - Name: DB_PASSWORD
              ValueFrom:
                Fn::ImportValue: !Sub careconnect-${Environment}-DatabasePasswordSecretArn
            - Name: SECURITY_JWT_SECRET
              ValueFrom:
                Fn::ImportValue: !Sub careconnect-${Environment}-JwtSecretArn

  # ECS Fargate service registered with Cloud Map for API Gateway discovery.
  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub careconnect-${Environment}-backend
      Cluster:
        Fn::ImportValue: !Sub careconnect-${Environment}-EcsClusterArn
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - Fn::ImportValue: !Sub careconnect-${Environment}-EcsTaskSecurityGroupId
          Subnets:
            - Fn::ImportValue: !Sub careconnect-${Environment}-PublicSubnetAId
            - Fn::ImportValue: !Sub careconnect-${Environment}-PublicSubnetBId
      ServiceRegistries:
        - RegistryArn: !GetAtt CloudMapService.Arn
          Port: !Ref ContainerPort

Outputs:
  # API Gateway invoke URL (always available).
  ApiEndpoint:
    Description: API Gateway HTTP API default endpoint
    Value: !GetAtt HttpApi.ApiEndpoint
    Export:
      Name: !Sub careconnect-${Environment}-ApiEndpoint

  # Custom domain URL (only when custom domain is configured).
  CustomDomainUrl:
    Condition: HasCustomDomain
    Description: Custom domain HTTPS URL
    Value: !Sub https://${DomainName}
    Export:
      Name: !Sub careconnect-${Environment}-CustomDomainUrl

  # Service name for CI/CD to force new deployments.
  ServiceName:
    Value: !Ref EcsService
    Export:
      Name: !Sub careconnect-${Environment}-ServiceName

  # VPC Link ID for reference by other stacks.
  VpcLinkId:
    Value: !Ref VpcLink
    Export:
      Name: !Sub careconnect-${Environment}-VpcLinkId

  # API ID for reference.
  HttpApiId:
    Value: !Ref HttpApi
    Export:
      Name: !Sub careconnect-${Environment}-HttpApiId
